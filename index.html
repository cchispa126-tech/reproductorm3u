<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vicio TV - Móvil</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; font-family: system-ui, Arial, sans-serif; color: white; min-height: 100vh; }
        
        /* Reproductor arriba del todo (como YouTube) */
        .player-container {
            position: sticky;
            top: 0;
            background: #000;
            z-index: 100;
        }
        .video-wrapper {
            aspect-ratio: 16 / 9;
            width: 100%;
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .player-info {
            padding: 10px;
            background: #0f0f0f;
        }
        .current-channel {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .current-channel-number {
            font-size: 11px;
            color: #ffaa00;
        }
        
        /* Botones de navegación grandes para móvil */
        .nav-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 10px 0;
        }
        .nav-btn {
            background: #ff2a2a;
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            flex: 1;
            max-width: 150px;
        }
        .nav-btn:active { background: #cc0000; }
        .nav-btn:disabled { background: #555; opacity: 0.5; }
        
        .player-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 5px;
        }
        .player-buttons button {
            background: #1e1e1e;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 12px;
        }
        .player-buttons button:active { background: #ff2a2a; }
        
        /* Selector numérico para móvil */
        .number-pad {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 10px 0;
            padding: 10px;
            background: #111;
            border-radius: 20px;
        }
        .num-btn {
            background: #1e1e1e;
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 25px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        .num-btn:active { background: #ff2a2a; }
        
        /* Lista de canales */
        .channels-container {
            padding: 15px;
        }
        .header {
            text-align: center;
            margin-bottom: 15px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
        }
        .tab-btn {
            background: #1e1e1e;
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
        }
        .tab-btn.active { background: #ff2a2a; }
        
        .buttons-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
            justify-content: center;
        }
        .btn-tdt { background: #0066cc; border: none; color: white; padding: 10px 15px; border-radius: 25px; font-size: 12px; cursor: pointer; }
        .btn-radio { background: #2c7a4d; border: none; color: white; padding: 10px 15px; border-radius: 25px; font-size: 12px; cursor: pointer; }
        .btn-m3u { background: #ff2a2a; border: none; color: white; padding: 10px 15px; border-radius: 25px; font-size: 12px; cursor: pointer; }
        
        .fav-buttons { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; }
        .btn-export { background: #555; border: none; color: white; padding: 8px 15px; border-radius: 25px; font-size: 11px; cursor: pointer; }
        
        .upload-area { text-align: center; padding: 12px; border: 2px dashed #ff2a2a; border-radius: 12px; margin-bottom: 15px; cursor: pointer; background: #0f0f0f; font-size: 12px; display: none; }
        .saved-list { margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 5px; }
        .saved-list button { background: #2c7a4d; border: none; color: white; padding: 6px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; }
        
        .search-box { margin-bottom: 15px; }
        .search-box input { width: 100%; padding: 12px; background: #1e1e1e; border: 1px solid #333; color: white; border-radius: 10px; font-size: 14px; }
        
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }
        .channel-card {
            background: #111;
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            border: 1px solid #222;
            transition: 0.2s;
            text-align: center;
            position: relative;
        }
        .channel-card:active { background: #1a1a1a; border-color: #ff2a2a; }
        .channel-card .thumbnail { font-size: 32px; margin-bottom: 8px; }
        .channel-card .channel-number { font-size: 10px; color: #ffaa00; background: #1a1a1a; display: inline-block; padding: 3px 8px; border-radius: 15px; margin-bottom: 6px; }
        .channel-card .channel-name { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .fav-star { position: absolute; top: 8px; right: 8px; font-size: 16px; cursor: pointer; color: #555; z-index: 10; }
        .fav-star.active { color: #ffaa00; }
        
        .counter { font-size: 12px; color: #ffaa00; text-align: center; padding: 10px; }
        .loading { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>
<div class="player-container">
    <div class="video-wrapper">
        <video id="videoPlayer" controls playsinline></video>
    </div>
    <div class="player-info">
        <div class="current-channel-number" id="currentChannelNumber"></div>
        <div class="current-channel" id="currentChannel">📺 Selecciona un canal</div>
        <div class="nav-buttons">
            <button class="nav-btn" id="prevChannelBtn">◀ ANTERIOR</button>
            <button class="nav-btn" id="nextChannelBtn">SIGUIENTE ▶</button>
        </div>
        <!-- Teclado numérico táctil -->
        <div class="number-pad" id="numberPad">
            <button class="num-btn" data-num="1">1</button>
            <button class="num-btn" data-num="2">2</button>
            <button class="num-btn" data-num="3">3</button>
            <button class="num-btn" data-num="4">4</button>
            <button class="num-btn" data-num="5">5</button>
            <button class="num-btn" data-num="6">6</button>
            <button class="num-btn" data-num="7">7</button>
            <button class="num-btn" data-num="8">8</button>
            <button class="num-btn" data-num="9">9</button>
            <button class="num-btn" data-num="10">10</button>
        </div>
        <div class="player-buttons">
            <button id="fullscreenBtn">🖥️ Pantalla Completa</button>
            <button id="copyUrlBtn">📋 Copiar URL</button>
            <button id="openVlcBtn">🎬 Abrir en VLC</button>
        </div>
    </div>
</div>

<div class="channels-container">
    <div class="header"><h2>🎬 VICIO TV</h2></div>
    
    <div class="tabs">
        <button class="tab-btn active" id="tabTodos">📡 TODOS</button>
        <button class="tab-btn" id="tabFavs">⭐ FAVORITOS</button>
    </div>
    
    <div class="buttons-row">
        <button class="btn-tdt" id="loadTdtBtn">📺 TV (500)</button>
        <button class="btn-radio" id="loadRadioBtn">📻 RADIO (1000)</button>
        <button class="btn-m3u" id="loadM3uBtn">📂 TU M3U</button>
    </div>
    
    <div class="fav-buttons">
        <button class="btn-export" id="exportFavsBtn">💾 Exportar</button>
        <button class="btn-export" id="importFavsBtn">📂 Importar</button>
    </div>
    <input type="file" id="importFavsFile" accept=".json" style="display:none">
    
    <div class="upload-area" id="uploadArea">📂 Haz clic para seleccionar .m3u</div>
    <input type="file" id="fileInput" accept=".m3u,.m3u8,.txt" style="display:none">
    
    <div class="saved-list" id="savedList"></div>
    <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Buscar canal..."></div>
    <div class="counter" id="counter">🟡 Cargando TV...</div>
    <div class="channels-grid" id="channelsGrid"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');
    const channelsGrid = document.getElementById('channelsGrid');
    const counter = document.getElementById('counter');
    const video = document.getElementById('videoPlayer');
    const currentChannelSpan = document.getElementById('currentChannel');
    const currentChannelNumberSpan = document.getElementById('currentChannelNumber');
    const savedListDiv = document.getElementById('savedList');
    const searchInput = document.getElementById('searchInput');
    const tabTodos = document.getElementById('tabTodos');
    const tabFavs = document.getElementById('tabFavs');
    const prevBtn = document.getElementById('prevChannelBtn');
    const nextBtn = document.getElementById('nextChannelBtn');
    
    let canales = [];
    let canalesFiltrados = [];
    let listasGuardadas = [];
    let favoritos = [];
    let modoFavoritos = false;
    let hls = null;
    let currentIndex = -1;
    
    const URL_TV = 'https://raw.githubusercontent.com/LaQuay/TDTChannels/master/tv-guide/spain/tv_channels_es_M3U8.m3u';
    const URL_RADIO = 'https://raw.githubusercontent.com/LaQuay/TDTChannels/master/radio-guide/spain/radio_es_M3U8.m3u';
    
    // Navegación
    function actualizarBotonesNav() {
        if (canalesFiltrados.length === 0) {
            prevBtn.disabled = true;
            nextBtn.disabled = true;
            return;
        }
        prevBtn.disabled = (currentIndex <= 0);
        nextBtn.disabled = (currentIndex >= canalesFiltrados.length - 1);
    }
    
    function canalSiguiente() {
        if (canalesFiltrados.length === 0) return;
        if (currentIndex < canalesFiltrados.length - 1) {
            reproducirPorIndex(currentIndex + 1);
        }
    }
    
    function canalAnterior() {
        if (canalesFiltrados.length === 0) return;
        if (currentIndex > 0) {
            reproducirPorIndex(currentIndex - 1);
        }
    }
    
    function irACanal(numero) {
        if (canalesFiltrados.length === 0) return;
        const index = numero - 1;
        if (index >= 0 && index < canalesFiltrados.length) {
            reproducirPorIndex(index);
        }
    }
    
    function reproducirPorIndex(index) {
        if (index < 0 || index >= canalesFiltrados.length) return;
        currentIndex = index;
        const canal = canalesFiltrados[currentIndex];
        const numeroCanal = currentIndex + 1;
        currentChannelNumberSpan.innerHTML = `📺 CANAL ${numeroCanal} de ${canalesFiltrados.length}`;
        currentChannelSpan.innerHTML = `${canal.name}`;
        
        if (hls) { hls.destroy(); hls = null; }
        const url = canal.url;
        if (Hls.isSupported() && url.includes('.m3u8')) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = url;
            video.play();
        }
        actualizarBotonesNav();
        
        const cards = document.querySelectorAll('.channel-card');
        cards.forEach((card, i) => {
            if (i === currentIndex) {
                card.style.borderColor = '#ff2a2a';
                card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } else {
                card.style.borderColor = '#222';
            }
        });
    }
    
    // Teclado numérico táctil
    document.querySelectorAll('.num-btn').forEach(btn => {
        btn.onclick = () => {
            const num = parseInt(btn.dataset.num);
            irACanal(num);
        };
    });
    
    // Favoritos
    function cargarFavoritos() { const favs = localStorage.getItem('vicio_favs'); if (favs) favoritos = JSON.parse(favs); }
    function guardarFavoritos() { localStorage.setItem('vicio_favs', JSON.stringify(favoritos)); }
    function esFavorito(c) { return favoritos.includes(`${c.name}_${c.url}`); }
    
    function toggleFavorito(canal, idx) {
        const id = `${canal.name}_${canal.url}`;
        const pos = favoritos.indexOf(id);
        if (pos === -1) favoritos.push(id); else favoritos.splice(pos, 1);
        guardarFavoritos();
        if (modoFavoritos) actualizarVista();
        else {
            const cards = document.querySelectorAll('.channel-card');
            if (cards[idx]) {
                const star = cards[idx].querySelector('.fav-star');
                if (star) { star.classList.toggle('active'); star.innerHTML = esFavorito(canal) ? '⭐' : '☆'; }
            }
        }
    }
    
    document.getElementById('exportFavsBtn').onclick = () => {
        const favs = localStorage.getItem('vicio_favs');
        if (!favs || favs === '[]') { alert('No hay favoritos'); return; }
        const blob = new Blob([favs], {type: 'application/json'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `favoritos_${new Date().toISOString().slice(0,19)}.json`;
        link.click();
        alert('✅ Exportados');
    };
    
    document.getElementById('importFavsBtn').onclick = () => document.getElementById('importFavsFile').click();
    document.getElementById('importFavsFile').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const favs = JSON.parse(ev.target.result);
                localStorage.setItem('vicio_favs', JSON.stringify(favs));
                cargarFavoritos();
                actualizarVista();
                alert(`✅ Importados ${favs.length}`);
            } catch(err) { alert('❌ Error'); }
        };
        reader.readAsText(file);
    };
    
    function actualizarVista() {
        if (modoFavoritos) {
            canalesFiltrados = canales.filter(c => esFavorito(c));
            counter.innerHTML = `⭐ ${canalesFiltrados.length} favoritos`;
        } else {
            canalesFiltrados = [...canales];
            counter.innerHTML = `📺 ${canales.length} canales`;
        }
        const busq = searchInput.value.toLowerCase();
        if (busq) { canalesFiltrados = canalesFiltrados.filter(c => c.name.toLowerCase().includes(busq)); counter.innerHTML = `🔍 ${canalesFiltrados.length}`; }
        mostrarCanales();
        if (canalesFiltrados.length > 0 && currentIndex >= canalesFiltrados.length) {
            currentIndex = 0;
        }
        actualizarBotonesNav();
        if (currentIndex >= 0 && canalesFiltrados.length > 0) {
            currentChannelNumberSpan.innerHTML = `📺 CANAL ${currentIndex+1} de ${canalesFiltrados.length}`;
        }
    }
    
    async function cargarURL(url, nombre) {
        counter.innerHTML = `🟡 Cargando ${nombre}...`;
        channelsGrid.innerHTML = '<div class="loading">⏳ Cargando...</div>';
        try {
            const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
            const resp = await fetch(proxy);
            const txt = await resp.text();
            parseM3U(txt, nombre);
        } catch(e) { counter.innerHTML = `❌ Error en ${nombre}`; }
    }
    
    function parseM3U(content, nombre) {
        const lines = content.split('\n');
        canales = [];
        let currentName = '';
        for (let line of lines) {
            line = line.trim();
            if (line.startsWith('#EXTINF:')) {
                const match = line.match(/#EXTINF:.*?,(.*)$/);
                if (match) currentName = match[1];
            } else if (line && !line.startsWith('#') && currentName && line.startsWith('http')) {
                canales.push({ name: currentName, url: line, group: nombre });
                currentName = '';
            }
        }
        if (canales.length === 0) { counter.innerHTML = `❌ No se encontraron canales`; return; }
        actualizarVista();
        guardarLista(nombre);
    }
    
    function guardarLista(nombre) {
        if (canales.length === 0) return;
        const lista = { id: Date.now(), nombre: nombre, canales: canales };
        listasGuardadas.unshift(lista);
        if (listasGuardadas.length > 10) listasGuardadas.pop();
        localStorage.setItem('m3u_listas', JSON.stringify(listasGuardadas));
        mostrarListas();
    }
    
    function mostrarListas() {
        const guardadas = localStorage.getItem('m3u_listas');
        if (guardadas) listasGuardadas = JSON.parse(guardadas);
        if (listasGuardadas.length === 0) { savedListDiv.innerHTML = '<small>No hay listas</small>'; return; }
        let html = '';
        listasGuardadas.forEach(l => { html += `<button onclick="cargarLista(${l.id})">📺 ${l.nombre.substring(0,20)} (${l.canales.length})</button>`; });
        savedListDiv.innerHTML = html;
    }
    
    window.cargarLista = function(id) {
        const lista = listasGuardadas.find(l => l.id === id);
        if (lista) { canales = lista.canales; actualizarVista(); uploadArea.style.display = 'none'; currentIndex = -1; }
    };
    
    function mostrarUpload() { uploadArea.style.display = 'block'; canales = []; actualizarVista(); counter.innerHTML = '🟡 Selecciona .m3u'; currentIndex = -1; }
    uploadArea.onclick = () => fileInput.click();
    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const text = await file.text();
        parseM3U(text, file.name.replace(/\.(m3u|m3u8|txt)$/i, ''));
        uploadArea.style.display = 'none';
    };
    
    function mostrarCanales() {
        channelsGrid.innerHTML = '';
        canalesFiltrados.forEach((c, idx) => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            const idxReal = canales.findIndex(c2 => c2.name === c.name && c2.url === c.url);
            card.onclick = (e) => { if (e.target.classList?.contains('fav-star')) return; reproducirPorIndex(idx); };
            const icono = c.group === 'RADIO' ? '📻' : '📺';
            const fav = esFavorito(c);
            const numero = idx + 1;
            card.innerHTML = `<div class="fav-star ${fav ? 'active' : ''}" onclick="event.stopPropagation(); window.toggleFav(${idxReal})">${fav ? '⭐' : '☆'}</div>
                              <div class="thumbnail">${icono}</div>
                              <div class="channel-number">#${numero}</div>
                              <div class="channel-name">${c.name.substring(0, 28)}</div>`;
            channelsGrid.appendChild(card);
        });
    }
    
    window.toggleFav = function(idx) { if (idx >= 0 && idx < canales.length) toggleFavorito(canales[idx], idx); };
    
    searchInput.addEventListener('input', () => actualizarVista());
    tabTodos.onclick = () => { modoFavoritos = false; tabTodos.classList.add('active'); tabFavs.classList.remove('active'); actualizarVista(); };
    tabFavs.onclick = () => { modoFavoritos = true; tabFavs.classList.add('active'); tabTodos.classList.remove('active'); actualizarVista(); };
    
    prevBtn.onclick = canalAnterior;
    nextBtn.onclick = canalSiguiente;
    
    function entrarFullscreen() {
        if (video.requestFullscreen) video.requestFullscreen();
        else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
    }
    document.getElementById('fullscreenBtn').onclick = entrarFullscreen;
    document.getElementById('copyUrlBtn').onclick = () => { if (video.src) { navigator.clipboard.writeText(video.src); alert('✅ URL copiada'); } };
    document.getElementById('openVlcBtn').onclick = () => { if (video.src) { window.location.href = `vlc://${video.src}`; alert(`Pega en VLC:\n${video.src}`); } };
    
    document.getElementById('loadTdtBtn').onclick = () => { cargarURL(URL_TV, 'TV'); uploadArea.style.display = 'none'; };
    document.getElementById('loadRadioBtn').onclick = () => { cargarURL(URL_RADIO, 'RADIO'); uploadArea.style.display = 'none'; };
    document.getElementById('loadM3uBtn').onclick = () => { mostrarUpload(); };
    
    cargarFavoritos();
    mostrarListas();
    cargarURL(URL_TV, 'TV');
</script>
</body>
</html>
