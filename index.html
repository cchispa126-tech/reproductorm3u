<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vicio TV - Ligero</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; font-family: system-ui, Arial, sans-serif; color: white; }
        
        /* Reproductor compacto */
        .player {
            position: sticky;
            top: 0;
            background: #000;
            z-index: 100;
        }
        video {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
        }
        .info {
            padding: 8px 10px;
            background: #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .canal-actual {
            font-size: 13px;
            font-weight: bold;
            flex: 1;
        }
        .numero-canal {
            font-size: 11px;
            color: #ffaa00;
        }
        button {
            background: #ff2a2a;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
        }
        button:active { background: #cc0000; }
        
        /* Navegación compacta */
        .nav {
            display: flex;
            gap: 10px;
            justify-content: center;
            padding: 8px;
            background: #0f0f0f;
        }
        .nav-btn {
            background: #1e1e1e;
            padding: 8px 20px;
            font-size: 13px;
        }
        .nav-btn:active { background: #ff2a2a; }
        
        /* Teclado numérico compacto */
        .num-pad {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            padding: 8px;
            background: #0f0f0f;
            border-top: 1px solid #222;
        }
        .num {
            background: #1e1e1e;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
        }
        
        /* Lista de canales */
        .lista {
            padding: 10px;
            height: 40vh;
            overflow-y: auto;
        }
        .controles-superiores {
            display: flex;
            gap: 8px;
            padding: 10px;
            flex-wrap: wrap;
            justify-content: center;
            border-bottom: 1px solid #222;
        }
        .btn-sm {
            background: #333;
            padding: 6px 12px;
            font-size: 11px;
        }
        .btn-sm:active { background: #555; }
        
        .tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 10px;
        }
        .tab {
            background: #1e1e1e;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 12px;
        }
        .tab.active { background: #ff2a2a; }
        
        .search {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            background: #1e1e1e;
            border: 1px solid #333;
            color: white;
            border-radius: 20px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 8px;
        }
        .canal {
            background: #111;
            border-radius: 10px;
            padding: 8px;
            text-align: center;
            position: relative;
            border: 1px solid #222;
        }
        .canal:active { background: #1a1a1a; }
        .canal .icono { font-size: 24px; }
        .canal .num { font-size: 9px; color: #ffaa00; margin-top: 4px; }
        .canal .nombre { font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 4px; }
        .estrella {
            position: absolute;
            top: 5px;
            right: 8px;
            font-size: 12px;
            color: #555;
        }
        .estrella.active { color: #ffaa00; }
        
        .contador { text-align: center; font-size: 11px; color: #ffaa00; padding: 5px; }
        .loading { text-align: center; padding: 20px; color: #888; }
    </style>
</head>
<body>

<div class="player">
    <video id="video" controls playsinline></video>
    <div class="info">
        <div>
            <div class="numero-canal" id="numCanal">Canal --</div>
            <div class="canal-actual" id="nombreCanal">Selecciona un canal</div>
        </div>
        <div>
            <button id="fullscreen">🖥️</button>
        </div>
    </div>
</div>

<div class="nav">
    <button class="nav-btn" id="anterior">◀ ANTERIOR</button>
    <button class="nav-btn" id="siguiente">SIGUIENTE ▶</button>
</div>

<div class="num-pad" id="numPad">
    <button class="num" data-num="1">1</button>
    <button class="num" data-num="2">2</button>
    <button class="num" data-num="3">3</button>
    <button class="num" data-num="4">4</button>
    <button class="num" data-num="5">5</button>
    <button class="num" data-num="6">6</button>
    <button class="num" data-num="7">7</button>
    <button class="num" data-num="8">8</button>
    <button class="num" data-num="9">9</button>
    <button class="num" data-num="10">10</button>
</div>

<div class="lista">
    <div class="controles-superiores">
        <button class="btn-sm" id="cargarTV">📺 TV</button>
        <button class="btn-sm" id="cargarRadio">📻 Radio</button>
        <button class="btn-sm" id="cargarM3U">📂 M3U</button>
        <button class="btn-sm" id="exportar">💾 Exp</button>
        <button class="btn-sm" id="importar">📂 Imp</button>
    </div>
    <input type="file" id="fileM3U" accept=".m3u,.m3u8,.txt" style="display:none">
    <input type="file" id="fileFav" accept=".json" style="display:none">
    
    <div class="tabs">
        <button class="tab active" id="tabTodos">📡 TODOS</button>
        <button class="tab" id="tabFavs">⭐ FAVS</button>
    </div>
    
    <input type="text" class="search" id="buscar" placeholder="🔍 Buscar canal...">
    
    <div class="contador" id="contador"></div>
    <div class="grid" id="grid"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
    // Elementos
    const video = document.getElementById('video');
    const numCanalSpan = document.getElementById('numCanal');
    const nombreCanalSpan = document.getElementById('nombreCanal');
    const grid = document.getElementById('grid');
    const contador = document.getElementById('contador');
    const buscar = document.getElementById('buscar');
    const tabTodos = document.getElementById('tabTodos');
    const tabFavs = document.getElementById('tabFavs');
    
    let canales = [];
    let filtrados = [];
    let favoritos = [];
    let modoFavs = false;
    let indiceActual = -1;
    let hls = null;
    
    // URLs
    const URL_TV = 'https://raw.githubusercontent.com/LaQuay/TDTChannels/master/tv-guide/spain/tv_channels_es_M3U8.m3u';
    const URL_RADIO = 'https://raw.githubusercontent.com/LaQuay/TDTChannels/master/radio-guide/spain/radio_es_M3U8.m3u';
    
    // Guardar favoritos
    function guardarFavs() { localStorage.setItem('vicio_favs', JSON.stringify(favoritos)); }
    function cargarFavs() { const f = localStorage.getItem('vicio_favs'); if (f) favoritos = JSON.parse(f); }
    function esFav(c) { return favoritos.includes(`${c.name}_${c.url}`); }
    
    function toggleFav(canal, idxReal) {
        const id = `${canal.name}_${canal.url}`;
        if (favoritos.includes(id)) favoritos = favoritos.filter(f => f !== id);
        else favoritos.push(id);
        guardarFavs();
        actualizarVista();
    }
    
    function actualizarVista() {
        let lista = canales;
        if (modoFavs) lista = canales.filter(c => esFav(c));
        const busq = buscar.value.toLowerCase();
        if (busq) lista = lista.filter(c => c.name.toLowerCase().includes(busq));
        filtrados = lista;
        contador.innerHTML = `📺 ${filtrados.length} canales`;
        mostrarCanales();
        if (indiceActual >= filtrados.length) indiceActual = -1;
        if (indiceActual >= 0 && filtrados[indiceActual]) {
            numCanalSpan.innerHTML = `Canal ${indiceActual+1} de ${filtrados.length}`;
            nombreCanalSpan.innerHTML = filtrados[indiceActual].name;
        }
    }
    
    function mostrarCanales() {
        grid.innerHTML = '';
        filtrados.forEach((c, idx) => {
            const card = document.createElement('div');
            card.className = 'canal';
            const idxReal = canales.findIndex(c2 => c2.name === c.name && c2.url === c.url);
            card.onclick = () => reproducir(idx);
            const icono = c.group === 'RADIO' ? '📻' : '📺';
            const fav = esFav(c);
            card.innerHTML = `
                <div class="estrella ${fav ? 'active' : ''}" onclick="event.stopPropagation(); window.toggleFavDesdeIndex(${idxReal})">${fav ? '⭐' : '☆'}</div>
                <div class="icono">${icono}</div>
                <div class="num">#${idx+1}</div>
                <div class="nombre">${c.name.substring(0, 20)}</div>
            `;
            grid.appendChild(card);
        });
    }
    
    window.toggleFavDesdeIndex = function(idx) {
        if (idx >= 0 && idx < canales.length) toggleFav(canales[idx], idx);
    };
    
    function reproducir(index) {
        if (index < 0 || index >= filtrados.length) return;
        indiceActual = index;
        const c = filtrados[indiceActual];
        numCanalSpan.innerHTML = `Canal ${indiceActual+1} de ${filtrados.length}`;
        nombreCanalSpan.innerHTML = c.name;
        if (hls) hls.destroy();
        const url = c.url;
        if (Hls.isSupported() && url.includes('.m3u8')) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = url;
            video.play();
        }
    }
    
    function siguiente() { if (indiceActual < filtrados.length - 1) reproducir(indiceActual + 1); }
    function anterior() { if (indiceActual > 0) reproducir(indiceActual - 1); }
    function irACanal(num) { if (num >= 1 && num <= filtrados.length) reproducir(num - 1); }
    
    // Cargar listas
    async function cargarURL(url, nombre) {
        contador.innerHTML = `🟡 Cargando ${nombre}...`;
        grid.innerHTML = '<div class="loading">⏳ Cargando...</div>';
        try {
            const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
            const resp = await fetch(proxy);
            const txt = await resp.text();
            parseM3U(txt, nombre);
        } catch(e) { contador.innerHTML = `❌ Error en ${nombre}`; }
    }
    
    function parseM3U(content, nombre) {
        const lines = content.split('\n');
        canales = [];
        let nombreActual = '';
        for (let line of lines) {
            line = line.trim();
            if (line.startsWith('#EXTINF:')) {
                const match = line.match(/#EXTINF:.*?,(.*)$/);
                if (match) nombreActual = match[1];
            } else if (line && !line.startsWith('#') && nombreActual && line.startsWith('http')) {
                canales.push({ name: nombreActual, url: line, group: nombre });
                nombreActual = '';
            }
        }
        if (canales.length === 0) { contador.innerHTML = '❌ No se encontraron canales'; return; }
        actualizarVista();
        guardarLista(nombre);
    }
    
    function guardarLista(nombre) {
        let listas = localStorage.getItem('m3u_listas');
        listas = listas ? JSON.parse(listas) : [];
        listas.unshift({ id: Date.now(), nombre: nombre, canales: canales });
        if (listas.length > 5) listas.pop();
        localStorage.setItem('m3u_listas', JSON.stringify(listas));
    }
    
    // M3U propio
    document.getElementById('cargarM3U').onclick = () => document.getElementById('fileM3U').click();
    document.getElementById('fileM3U').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const text = await file.text();
        parseM3U(text, file.name.replace(/\.(m3u|m3u8|txt)$/i, ''));
    };
    
    // Exportar/Importar favoritos
    document.getElementById('exportar').onclick = () => {
        const blob = new Blob([JSON.stringify(favoritos)], {type: 'application/json'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `favoritos_${Date.now()}.json`;
        link.click();
    };
    document.getElementById('importar').onclick = () => document.getElementById('fileFav').click();
    document.getElementById('fileFav').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                favoritos = JSON.parse(ev.target.result);
                guardarFavs();
                actualizarVista();
                alert('✅ Favoritos importados');
            } catch(e) { alert('❌ Error'); }
        };
        reader.readAsText(file);
    };
    
    // Botones
    document.getElementById('cargarTV').onclick = () => cargarURL(URL_TV, 'TV');
    document.getElementById('cargarRadio').onclick = () => cargarURL(URL_RADIO, 'RADIO');
    document.getElementById('anterior').onclick = anterior;
    document.getElementById('siguiente').onclick = siguiente;
    document.getElementById('fullscreen').onclick = () => { if (video.requestFullscreen) video.requestFullscreen(); };
    
    document.querySelectorAll('.num').forEach(btn => {
        btn.onclick = () => irACanal(parseInt(btn.dataset.num));
    });
    
    tabTodos.onclick = () => { modoFavs = false; tabTodos.classList.add('active'); tabFavs.classList.remove('active'); actualizarVista(); };
    tabFavs.onclick = () => { modoFavs = true; tabFavs.classList.add('active'); tabTodos.classList.remove('active'); actualizarVista(); };
    buscar.addEventListener('input', () => actualizarVista());
    
    // Iniciar
    cargarFavs();
    cargarURL(URL_TV, 'TV');
</script>
</body>
</html>
